services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:
  uploads:
